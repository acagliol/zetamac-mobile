name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: inject the Google Client ID from a repository variable instead
      # of committing it. Set a repo variable named GOOGLE_CLIENT_ID and
      # uncomment the block below.
      #
      # - name: Write config.js
      #   run: |
      #     cat > js/config.js <<EOF
      #     window.ZETAMAC_CONFIG = {
      #       GOOGLE_CLIENT_ID: "${{ vars.GOOGLE_CLIENT_ID }}",
      #       SPREADSHEET_NAME: "Zetamac Results",
      #       SHEET_TAB_NAME: "Results",
      #     };
      #     EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
