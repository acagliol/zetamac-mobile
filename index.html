<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Zetamac Mobile — Mental Math</title>
    <meta
      name="description"
      content="A mobile-friendly mental math game with an on-screen keypad and Google Sheets result tracking."
    />
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Google Identity Services (used only if a Client ID is configured) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
  </head>
  <body>
    <main class="app">
      <!-- ───────────────────────── HOME / SETTINGS ───────────────────────── -->
      <section id="screen-home" class="screen">
        <header class="topbar">
          <h1 class="logo">Zetamac<span>Mobile</span></h1>
          <div id="account" class="account">
            <button id="signin-btn" class="btn btn--ghost" hidden>Sign in with Google</button>
            <div id="account-info" class="account__info" hidden>
              <img id="account-pic" alt="" class="account__pic" />
              <span id="account-email" class="account__email"></span>
              <button id="signout-btn" class="btn btn--text">Sign out</button>
            </div>
          </div>
        </header>

        <p id="auth-note" class="note" hidden>
          Sign in to automatically save your scores to your own Google Sheet.
        </p>

        <form id="settings" class="settings" autocomplete="off">
          <fieldset class="settings__group">
            <legend>Operations</legend>
            <label class="check"><input type="checkbox" name="addition" checked /> Addition</label>
            <label class="check"><input type="checkbox" name="subtraction" checked /> Subtraction</label>
            <label class="check"><input type="checkbox" name="multiplication" checked /> Multiplication</label>
            <label class="check"><input type="checkbox" name="division" checked /> Division</label>
          </fieldset>

          <details class="settings__advanced">
            <summary>Number ranges</summary>
            <div class="range-row">
              <span class="range-row__label">Addition</span>
              <input type="number" name="add-leftMin" value="2" min="0" />
              <span>to</span>
              <input type="number" name="add-leftMax" value="100" min="0" />
              <span>+</span>
              <input type="number" name="add-rightMin" value="2" min="0" />
              <span>to</span>
              <input type="number" name="add-rightMax" value="100" min="0" />
            </div>
            <div class="range-row">
              <span class="range-row__label">Multiply</span>
              <input type="number" name="mul-leftMin" value="2" min="0" />
              <span>to</span>
              <input type="number" name="mul-leftMax" value="12" min="0" />
              <span>×</span>
              <input type="number" name="mul-rightMin" value="2" min="0" />
              <span>to</span>
              <input type="number" name="mul-rightMax" value="100" min="0" />
            </div>
          </details>

          <div class="range-row range-row--duration">
            <span class="range-row__label">Duration</span>
            <select name="duration">
              <option value="30">30 seconds</option>
              <option value="60">60 seconds</option>
              <option value="120" selected>120 seconds</option>
              <option value="180">180 seconds</option>
              <option value="300">300 seconds</option>
            </select>
          </div>
        </form>

        <button id="start-btn" class="btn btn--primary btn--block">Start</button>
      </section>

      <!-- ───────────────────────────── GAME ──────────────────────────────── -->
      <section id="screen-game" class="screen" hidden>
        <div class="hud">
          <span class="hud__item">Seconds left: <span id="time">0</span></span>
          <span class="hud__item">Score: <span id="score">0</span></span>
        </div>

        <div class="problem-area">
          <div class="equation">
            <span id="problem" class="problem">0 + 0</span>
            <span class="equals">=</span>
            <span id="answer" class="answer" aria-live="polite"></span>
          </div>
        </div>

        <div id="keypad" class="keypad"></div>
      </section>

      <!-- ──────────────────────────── RESULTS ────────────────────────────── -->
      <section id="screen-results" class="screen" hidden>
        <h2 class="results__title">Time!</h2>
        <div class="results__score" id="final-score">0</div>
        <div class="results__grid">
          <div><span class="results__label">Correct</span><span id="final-correct">0</span></div>
          <div><span class="results__label">Incorrect</span><span id="final-incorrect">0</span></div>
          <div><span class="results__label">Duration</span><span id="final-duration">0s</span></div>
        </div>

        <p id="save-status" class="save-status"></p>
        <a id="view-sheet" class="btn btn--ghost btn--block" target="_blank" rel="noopener" hidden>
          View results spreadsheet
        </a>
        <button id="again-btn" class="btn btn--primary btn--block">Play again</button>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
